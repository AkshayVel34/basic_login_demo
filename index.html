<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f1f3f6;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.brand{
font-weight:bold;
font-size:24px;
color:#2874f0;
text-align:center;
margin-bottom:15px;
}
</style>

</head>

<body>

<div class="login-box">

<div class="brand">MyShop</div>

<h5 class="text-center mb-3">Login</h5>

<form id="loginForm">

<input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

<p class="text-center mt-3">
New user? <a href="signup.html">Create account</a>
</p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
e.preventDefault()

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

if(res.ok){
window.location="home.html"
}else{
alert(await res.text())
}

})
</script>

</body>
</html>
