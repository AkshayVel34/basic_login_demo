<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.brand{
font-size:24px;
font-weight:bold;
color:#2874f0;
text-align:center;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="box">

<div class="brand">MyShop</div>

<h5 class="text-center mb-3">Create Account</h5>

<form id="signupForm">

<input id="username" class="form-control mb-3" placeholder="Username" required>

<input id="password" type="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-success w-100">Sign Up</button>

</form>

<p class="text-center mt-3">
Already have an account? <a href="index.html">Login</a>
</p>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", async (e)=>{

e.preventDefault()

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const res=await fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

if(res.ok){
alert("Account created")
window.location="index.html"
}else{
alert(await res.text())
}

})

</script>

</body>
</html>
